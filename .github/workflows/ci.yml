name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dnp3-monitor .

      - name: Start container
        run: docker run -d -p 8000:8000 --name dnp3-test dnp3-monitor

      - name: Wait for startup
        run: sleep 10

      - name: Check health endpoint
        run: curl -f http://localhost:8000/health || exit 1

      - name: Stop container
        run: docker stop dnp3-test
